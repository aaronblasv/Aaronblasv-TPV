<ion-content>
  <div class="layout">
    <app-sidebar></app-sidebar>

    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Impuestos</h1>
          <p>Gestiona los tipos de IVA</p>
        </div>
        <button class="btn-primary" (click)="openForm()">+ Nuevo Impuesto</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Porcentaje</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (tax of taxes; track tax.uuid) {
              <tr>
                <td>{{ tax.name }}</td>
                <td>{{ tax.percentage }}%</td>
                <td class="actions">
                  <button class="btn-edit" (click)="openForm(tax)">Editar</button>
                  <button class="btn-delete" (click)="delete(tax.uuid)">Eliminar</button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      @if (showForm) {
        <div class="modal-overlay" (click)="closeForm()">
          <div class="modal" (click)="$event.stopPropagation()">
            <h2>{{ editingTax ? 'Editar Impuesto' : 'Nuevo Impuesto' }}</h2>

            <div class="form-group">
              <label>Nombre</label>
              <input type="text" [(ngModel)]="form.name" placeholder="Nombre del impuesto" />
            </div>

            <div class="form-group">
              <label>Porcentaje</label>
              <input type="number" [(ngModel)]="form.percentage" placeholder="0" />
            </div>

            <div class="modal-actions">
              <button class="btn-secondary" (click)="closeForm()">Cancelar</button>
              <button class="btn-primary" (click)="save()">Guardar</button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</ion-content>
