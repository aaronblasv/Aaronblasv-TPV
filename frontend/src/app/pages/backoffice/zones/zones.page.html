<ion-content>
  <div class="layout">
    <app-sidebar></app-sidebar>

    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Zonas</h1>
          <p>Gestiona las zonas del restaurante</p>
        </div>
        <button class="btn-primary" (click)="openForm()">+ Nueva Zona</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (zone of zones; track zone.uuid) {
              <tr>
                <td>{{ zone.name }}</td>
                <td>
                  <app-action-buttons
                    [showToggle]="false"
                    (onEdit)="openForm(zone)"
                    (onDelete)="requestDelete(zone.uuid)"
                  />
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      <app-form-modal
        [visible]="showForm"
        [title]="editingZone ? 'Editar Zona' : 'Nueva Zona'"
        [errors]="errors"
        (onSave)="save()"
        (onCancel)="closeForm()"
      >
        <div class="form-group">
          <label>Nombre</label>
          <input
            type="text"
            [(ngModel)]="form.name"
            placeholder="Nombre de la zona"
            [class.input-error]="errors['name']"
          />
          @if (errors['name']) {
            <span class="error-msg">{{ errors['name'] }}</span>
          }
        </div>
      </app-form-modal>

      <app-confirm-modal
        [visible]="showConfirm"
        title="¿Eliminar zona?"
        message="Esta acción eliminará la zona permanentemente."
        (onConfirm)="confirmDelete()"
        (onCancel)="closeConfirm()"
      />
    </div>
  </div>
</ion-content>
