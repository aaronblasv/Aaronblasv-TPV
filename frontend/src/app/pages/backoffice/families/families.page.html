<ion-content>
  <div class="layout">
    <app-sidebar></app-sidebar>

    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Familias</h1>
          <p>Gestiona las familias de productos</p>
        </div>
        <button class="btn-primary" (click)="openForm()">+ Nueva Familia</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (family of families; track family.uuid) {
              <tr>
                <td>{{ family.name }}</td>
                <td>
                  <span [class]="family.active ? 'badge-active' : 'badge-inactive'">
                    {{ family.active ? 'Activa' : 'Inactiva' }}
                  </span>
                </td>
                <td>
                  <app-action-buttons
                    [showToggle]="true"
                    [isActive]="family.active"
                    (onEdit)="openForm(family)"
                    (onDelete)="requestDelete(family.uuid)"
                    (onToggle)="toggle(family)"
                  />
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      <app-form-modal
        [visible]="showForm"
        [title]="editingFamily ? 'Editar Familia' : 'Nueva Familia'"
        [errors]="errors"
        (onSave)="save()"
        (onCancel)="closeForm()"
      >
        <div class="form-group">
          <label>Nombre</label>
          <input
            type="text"
            [(ngModel)]="form.name"
            placeholder="Nombre de la familia"
            [class.input-error]="errors['name']"
          />
          @if (errors['name']) {
            <span class="error-msg">{{ errors['name'] }}</span>
          }
        </div>
      </app-form-modal>

      <app-confirm-modal
        [visible]="showConfirm"
        title="¿Eliminar familia?"
        message="Esta acción eliminará la familia permanentemente."
        (onConfirm)="confirmDelete()"
        (onCancel)="closeConfirm()"
      />
    </div>
  </div>
</ion-content>
